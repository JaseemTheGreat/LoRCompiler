name: Build Mod DLL

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Download Game References
      run: |
        curl -L -o refs.zip "https://github.com"
        tar -xf refs.zip
        mv LibraryOfRuina-References-master LibraryOfRuina-References-master

    - name: Restore NuGet Packages
      run: dotnet restore MyMod.csproj

    - name: Compile Mod
      run: msbuild MyMod.csproj /p:Configuration=Release
